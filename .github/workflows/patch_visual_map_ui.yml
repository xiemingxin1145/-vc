name: Patch visual map UI

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'tools/patch_visual_map_ui.py'
      - '.github/workflows/patch_visual_map_ui.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Run map UI patch
        run: python tools/patch_visual_map_ui.py
      - name: Commit MainActivity map image UI
        run: |
          if git diff --quiet; then
            echo "No changes needed."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/src/main/java/com/example/MainActivity.kt
          git commit -m "feat: show Sanguo overview map in territory tab"
          git push
