name: Patch title visuals UI

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'tools/patch_title_visuals_ui.py'
      - '.github/workflows/patch_title_visuals_ui.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Run title visuals patch
        run: python tools/patch_title_visuals_ui.py
      - name: Commit title visuals UI
        run: |
          if git diff --quiet; then
            echo "No changes needed."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/src/main/java/com/example/MainActivity.kt
          git commit -m "feat: show map and portraits on title screen"
          git push
