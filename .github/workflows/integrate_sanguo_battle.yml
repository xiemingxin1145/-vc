name: Integrate Sanguo Battle Expansion

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'tools/integrate_sanguo_battle.py'
      - 'app/src/main/java/com/example/ui/SanguoBattleExpansion.kt'
      - 'app/src/main/java/com/example/ui/SanguoAnnualEventPicker.kt'
      - '.github/workflows/integrate_sanguo_battle.yml'

permissions:
  contents: write

jobs:
  integrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run integration patch
        run: python tools/integrate_sanguo_battle.py

      - name: Commit integrated GameViewModel
        run: |
          if git diff --quiet; then
            echo "No integration changes needed."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/src/main/java/com/example/ui/GameViewModel.kt
          git commit -m "feat: integrate Sanguo battle events into annual loop"
          git push
